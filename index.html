<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Perpustakaan BSI</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- ROOT & THEME --- */
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --primary: #48a39e;
            --primary-hover: #367c78;
            --accent: #F2AB3B;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            margin: 0; 
            line-height: 1.6;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        .hidden { display: none !important; }
        
        /* --- ANIMASI --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate { animation: fadeIn 0.4s ease forwards; }

        /* --- HEADER --- */
        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 2.2rem; font-weight: 800; color: var(--primary); margin: 0; }
        header p { color: var(--text-muted); margin-top: 8px; font-size: 0.95rem; }

        /* --- TOOLBAR (Pencarian) --- */
        .toolbar { 
            display: flex; gap: 10px; margin-bottom: 20px; 
            background: var(--bg-card); padding: 10px; 
            border-radius: 14px; border: 1px solid var(--border);
        }
        .search-box { flex: 1; }
        .search-box input {
            width: 100%; background: #0f172a; border: 1px solid var(--border);
            padding: 12px 18px; border-radius: 10px; color: white;
            font-size: 0.95rem; transition: var(--transition);
        }
        .search-box input:focus { outline: none; border-color: var(--primary); }

        .btn {
            padding: 12px 24px; border-radius: 10px; font-weight: 600;
            cursor: pointer; transition: var(--transition); border: none;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.9rem;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { background: var(--border); }

        /* --- TABEL --- */
        .card-table { 
            background: var(--bg-card); border-radius: 18px; 
            border: 1px solid var(--border); overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(72, 163, 158, 0.1); padding: 18px 20px; color: var(--primary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); text-align: left; }
        td { padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        .book-link { color: var(--text-main); font-weight: 600; text-decoration: none; cursor: pointer; }
        .book-link:hover { color: var(--accent); text-decoration: underline; }
        .badge { background: rgba(72, 163, 158, 0.15); color: var(--primary); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; }

        .action-footer { margin-top: 25px; text-align: center; }

        /* --- DETAIL VIEW --- */
        .detail-card { 
            background: var(--bg-card); padding: 40px; border-radius: 20px; 
            border: 1px solid var(--border); display: flex; gap: 40px; align-items: flex-start;
        }
        .cover-area { flex: 0 0 240px; }
        .cover-area img { width: 100%; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border); }
        .info-area { flex: 1; }
        .info-area h2 { font-size: 2rem; margin: 0 0 15px 0; color: var(--primary); line-height: 1.2; }
        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .meta-label { color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 4px; }
        .meta-value { font-size: 1rem; color: var(--text-main); margin-bottom: 15px; }

        /* --- FORM --- */
        .form-card { background: var(--bg-card); padding: 35px; border-radius: 20px; border: 1px solid var(--border); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
        .form-group input, .form-group textarea { background: #0f172a; border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: white; font-family: inherit; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--primary); outline: none; }

        /* --- AKSI ICON --- */
        .btn-icon { background: rgba(255,255,255,0.05); border: none; cursor: pointer; padding: 10px; border-radius: 8px; color: var(--text-muted); margin-left: 5px; }
        .btn-icon:hover.edit { color: var(--accent); }
        .btn-icon:hover.delete { color: var(--danger); }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 768px) {
            .container { padding: 20px 15px; }
            header h1 { font-size: 1.8rem; }

            /* Table to Card Mobile */
            .card-table { background: transparent; border: none; box-shadow: none; }
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { background: var(--bg-card); margin-bottom: 15px; border-radius: 16px; border: 1px solid var(--border); padding: 15px; }
            td { text-align: right; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: flex-end; align-items: center; position: relative; }
            td::before { content: attr(data-label); position: absolute; left: 0; font-weight: 700; text-transform: uppercase; font-size: 0.7rem; color: var(--primary); }
            
            /* Detail Mobile (FOTO TENGAH) */
            .detail-card { flex-direction: column; align-items: center; text-align: center; padding: 25px; }
            .cover-area { flex: 0 0 auto; width: 220px; margin-bottom: 10px; }
            .info-area h2 { font-size: 1.6rem; }
            .meta-grid { grid-template-columns: 1fr; gap: 0; }
            .meta-value { margin-bottom: 20px; }

            /* Form Mobile */
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }

        footer { text-align: center; margin-top: 50px; color: var(--text-muted); font-size: 0.8rem; padding-bottom: 30px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Sistem Perpustakaan BSI</h1>
            <p>Katalog Digital Literasi BSI</p>
        </header>

        <!-- HALAMAN DAFTAR -->
        <section id="view-list" class="animate">
            <div class="toolbar">
                <div class="search-box">
                    <input type="text" id="inputPencarian" placeholder="Cari judul, penulis, atau kategori..." onkeyup="handleSearchKey(event)">
                </div>
                <button class="btn btn-primary" onclick="filterTabel()">Cari</button>
            </div>

            <div class="card-table">
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Judul Buku</th>
                            <th>Penulis</th>
                            <th>Tahun</th>
                            <th>Kategori</th>
                            <th style="text-align: center;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="isiTabel"></tbody>
                </table>
            </div>

            <div class="action-footer">
                <button class="btn btn-primary" onclick="bukaForm()">+ Tambah Koleksi Baru</button>
            </div>
        </section>

        <!-- HALAMAN DETAIL (Sudah diperbaiki untuk Foto Tengah di Mobile) -->
        <section id="view-detail" class="hidden animate">
            <button class="btn btn-outline" style="margin-bottom: 20px;" onclick="gantiHalaman('view-list')">← Kembali</button>
            <div id="kontenDetail"></div>
        </section>

        <!-- HALAMAN FORM (Sudah ditambahkan Deskripsi) -->
        <section id="view-form" class="hidden animate">
            <div class="form-card">
                <h2 id="formTitle" style="margin-top:0; color:var(--primary); margin-bottom: 25px;">Form Koleksi</h2>
                <div class="form-grid">
                    <input type="hidden" id="editId">
                    <div class="form-group">
                        <label>Judul Buku</label>
                        <input type="text" id="f_judul" placeholder="Masukkan judul buku">
                    </div>
                    <div class="form-group">
                        <label>Penulis</label>
                        <input type="text" id="f_penulis" placeholder="Nama penulis">
                    </div>
                    <div class="form-group">
                        <label>Tahun Terbit</label>
                        <input type="text" id="f_tahun" placeholder="Contoh: 2024">
                    </div>
                    <div class="form-group">
                        <label>Kategori</label>
                        <input type="text" id="f_kategori" placeholder="Contoh: Pendidikan">
                    </div>
                    <div class="form-group full-width">
                        <label>URL / Path Cover Buku</label>
                        <input type="text" id="f_cover" placeholder="Contoh: assets/nama-file.jpg">
                    </div>
                    <div class="form-group full-width">
                        <label>Sinopsis / Deskripsi</label>
                        <textarea id="f_deskripsi" rows="5" placeholder="Tuliskan ringkasan buku..."></textarea>
                    </div>
                </div>
                <div style="margin-top: 30px; display: flex; gap: 12px;">
                    <button class="btn btn-primary" onclick="simpanBuku()">Simpan Data</button>
                    <button class="btn btn-outline" onclick="gantiHalaman('view-list')">Batal</button>
                </div>
            </div>
        </section>

        <footer>
            &copy; 2026 BSI Digital Library &bull; Managed by <b>Min</b>
        </footer>
    </div>

    <script>
        let daftarBuku = JSON.parse(localStorage.getItem('bsi_db')) || [
            { id: "1", judul: "Guru Gembul Bicara Pendidikan", penulis: "Irma Susanti", tahun: "2023", kategori: "Pendidikan", cover: "assets/ggbp.jpg", deskripsi: "Buku inspiratif yang membahas gagasan pendidikan dengan gaya dialog yang ringan." },
            { id: "2", judul: "Andai Aku Menteri Pendidikan", penulis: "Alfian Bahri", tahun: "2024", kategori: "Ilmu Sosial", cover: "assets/ab.jpg", deskripsi: "Refleksi sistem pendidikan dari perspektif menteri fiksi." },
            { id: "3", judul: "With No Edge Nor Doubt", penulis: "Ahmad Muhaimin", tahun: "2024", kategori: "Kumpulan Puisi", cover: "assets/min.jpeg", deskripsi: "Kumpulan puisi modern penuh emosi." }
        ];

        function gantiHalaman(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function renderTabel() {
            const tbody = document.getElementById('isiTabel');
            tbody.innerHTML = daftarBuku.map((b, i) => `
                <tr>
                    <td data-label="No" style="text-align:center;">${i+1}</td>
                    <td data-label="Judul"><span class="book-link" onclick="tampilkanDetail('${b.id}')">${b.judul}</span></td>
                    <td data-label="Penulis">${b.penulis}</td>
                    <td data-label="Tahun">${b.tahun}</td>
                    <td data-label="Kategori"><span class="badge">${b.kategori}</span></td>
                    <td data-label="Aksi" style="text-align:center;">
                        <button class="btn-icon edit" onclick="bukaForm('${b.id}')">✎</button>
                        <button class="btn-icon delete" onclick="hapusBuku('${b.id}')">🗑</button>
                    </td>
                </tr>
            `).join('');
            localStorage.setItem('bsi_db', JSON.stringify(daftarBuku));
        }

        function tampilkanDetail(id) {
            const b = daftarBuku.find(x => x.id === id);
            document.getElementById('kontenDetail').innerHTML = `
                <div class="detail-card">
                    <div class="cover-area">
                        <img src="${b.cover}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Cover'">
                    </div>
                    <div class="info-area">
                        <span class="meta-label">Judul Buku</span>
                        <h2>${b.judul}</h2>
                        <div class="meta-grid">
                            <div><span class="meta-label">Penulis</span><div class="meta-value">${b.penulis}</div></div>
                            <div><span class="meta-label">Tahun</span><div class="meta-value">${b.tahun}</div></div>
                            <div><span class="meta-label">Kategori</span><div class="meta-value">${b.kategori}</div></div>
                        </div>
                        <div style="border-top:1px solid var(--border); padding-top:15px; margin-top:10px;">
                            <span class="meta-label">Sinopsis</span>
                            <p style="color:var(--text-muted); text-align:justify; font-size:0.95rem;">${b.deskripsi || 'Deskripsi belum tersedia.'}</p>
                        </div>
                    </div>
                </div>
            `;
            gantiHalaman('view-detail');
        }

        function bukaForm(id = null) {
            const b = daftarBuku.find(x => x.id === id);
            document.getElementById('formTitle').innerText = id ? "Edit Koleksi" : "Tambah Koleksi";
            document.getElementById('editId').value = id || "";
            document.getElementById('f_judul').value = b ? b.judul : "";
            document.getElementById('f_penulis').value = b ? b.penulis : "";
            document.getElementById('f_tahun').value = b ? b.tahun : "";
            document.getElementById('f_kategori').value = b ? b.kategori : "";
            document.getElementById('f_cover').value = b ? b.cover : "";
            document.getElementById('f_deskripsi').value = b ? b.deskripsi : "";
            gantiHalaman('view-form');
        }

        function simpanBuku() {
            const id = document.getElementById('editId').value;
            const data = {
                id: id || Date.now().toString(),
                judul: document.getElementById('f_judul').value,
                penulis: document.getElementById('f_penulis').value,
                tahun: document.getElementById('f_tahun').value,
                kategori: document.getElementById('f_kategori').value,
                cover: document.getElementById('f_cover').value || 'assets/default.jpg',
                deskripsi: document.getElementById('f_deskripsi').value
            };
            
            if(!data.judul || !data.penulis) return alert("Judul dan Penulis wajib diisi!");
            
            if(id) {
                const idx = daftarBuku.findIndex(x => x.id === id);
                daftarBuku[idx] = data;
            } else {
                daftarBuku.push(data);
            }
            renderTabel();
            gantiHalaman('view-list');
        }

        function hapusBuku(id) {
            if(confirm("Yakin ingin menghapus buku ini?")) {
                daftarBuku = daftarBuku.filter(x => x.id !== id);
                renderTabel();
            }
        }

        function filterTabel() {
            const key = document.getElementById('inputPencarian').value.toLowerCase();
            const rows = document.querySelectorAll('#isiTabel tr');
            rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(key) ? '' : 'none');
        }

        function handleSearchKey(e) { if(e.key === "Enter") filterTabel(); }

        renderTabel();
    </script>
</body>
</html>
