<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <title>Sistem Otomasi Perpustakaan Digital</title>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            color: #333; 
            margin: 0; 
            padding: 40px 20px; 
            position: relative;
            box-sizing: border-box;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('assets/perpus.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: blur(5px);
            opacity: 0.5;
            z-index: -1;
            transform: translateZ(0);
        }
        .header-utama {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 24px 20px;
            margin: 0 auto 30px auto;
            text-align: center;
            border-radius: 12px;
            max-width: 1000px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            backdrop-filter: blur(5px);
        }
        .header-utama h1 { font-size: 28px; color: #48a39e; margin: 0 0 8px 0; padding: 0; }
        .header-utama p { font-size: 16px; color: #444; margin: 0; }
        
        .wadah-pencarian { max-width: 1000px; margin: 0 auto 20px auto; display: flex; gap: 10px; }
        .input-pencarian { flex-grow: 1; padding: 12px 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; font-family: inherit; transition: border-color 0.3s; }
        .input-pencarian:focus { outline: none; border-color: #48a39e; box-shadow: 0 0 5px rgba(52, 152, 219, 0.3); }
        .tombol-cari { display: inline-block; background-color: #48a39e; color: white; border: none; padding: 12px 28px; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(52, 152, 219, 0.4); box-sizing: border-box; }
        .tombol-cari:hover { background-color: #F2AB3B; box-shadow: 0 4px 12px rgba(52, 152, 219, 0.45); transform: translateY(-2px); }

        .wadah-tabel { width: 100%; max-width: 1000px; margin: 0 auto 30px auto; overflow-x: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-radius: 8px; background-color: #ffffff; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; background-color: #ffffff; table-layout: fixed; border-radius: 8px; overflow: hidden; }
        th { background-color: #48a39e; color: #ffffff; padding: 15px; text-align: left; font-weight: 600; white-space: nowrap; }
        th:first-child, td:first-child { width: 40px; text-align: center; }
        td { padding: 12px 15px; border-bottom: 1px solid #eeeeee; word-break: break-word; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #f8fbff; }

        .wadah-tombol { text-align: center; }
        .tombol-utama { display: inline-block; background-color: #48a39e; color: white; padding: 12px 28px; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 15px; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(52, 152, 219, 0.4); box-sizing: border-box; border: none; outline: none; }
        .tombol-utama:hover { background-color: #F2AB3B; box-shadow: 0 4px 12px rgba(52, 152, 219, 0.45); transform: translateY(-2px); }

        /* Tambahan: gaya untuk tautan judul buku di tabel */
        .link-buku { color: inherit; text-decoration: none; }
        .link-buku:hover { color: #F2AB3B; text-decoration: underline; }

        /* Pastikan input/textarea tidak overflow dari wadahnya */
        #formTambah input,
        #formTambah textarea {
            width: 100%;
            box-sizing: border-box;
        }

        /* Gaya untuk ikon aksi */
        .icon-edit, .icon-delete {
            cursor: pointer;
            margin: 0 5px;
            padding: 6px;
            border-radius: 4px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
        }
        .icon-edit {
            color: #48a39e;
        }
        .icon-edit:hover {
            background-color: #e8f4f8;
            color: #367c78;
        }
        .icon-delete {
            color: #e74c3c;
        }
        .icon-delete:hover {
            background-color: #ffeaea;
            color: #c0392b;
        }

        @media screen and (max-width: 600px) {
            body { padding: 15px 10px; }
            .header-utama { padding: 20px 15px; margin-bottom: 20px; }
            .header-utama h1 { font-size: 22px; }
            .header-utama p { font-size: 14px; }
            th, td { padding: 8px 10px; font-size: 14px; }
            th { white-space: normal; }
            .wadah-pencarian { flex-direction: column; gap: 8px; }
            .input-pencarian { font-size: 14px; padding: 10px 12px; }
            .tombol-cari { width: 100%; padding: 10px; font-size: 14px; }
        .wadah-tabel { margin: 0 0 20px 0; }
        table { font-size: 14px; min-width: 700px; }
            .wadah-tombol { margin: 20px 0; }
            .tombol-utama { display: block; width: 100%; font-size: 14px; padding: 12px; margin-bottom: 10px; }
            #formTambah { margin: 20px -10px; padding: 15px; }
            #formTambah h2 { font-size: 18px; }
            #formTambah > div { grid-template-columns: 1fr; }
            #formTambah label { padding: 10px; }
            #formTambah input, #formTambah textarea { font-size: 14px; padding: 8px; }
            .icon-edit, .icon-delete { font-size: 16px; padding: 4px; }
        }
    </style>
</head>
<body>

    <header class="header-utama">
        <h1>Sistem Informasi Perpustakaan BSI</h1>
        <p>Antarmuka katalog literatur untuk mendukung transformasi digital dan otomasi layanan.</p>
    </header>

    <div class="wadah-pencarian">
        <input type="text" id="inputPencarian" class="input-pencarian" placeholder="Masukkan kata kunci (Judul, Penulis, atau Kategori)...">
        <button class="tombol-cari">Cari</button>
    </div>

    <div class="wadah-tabel">
        <table id="tabelKatalog">
            <!-- Tabel akan di-render secara otomatis oleh JavaScript -->
        </table>
    </div>

    <div class="wadah-tombol">
        <button id="btnTambah" class="tombol-utama">+ Tambah Koleksi Baru</button>
    </div>

    <div id="formTambah" style="max-width: 800px; margin: 20px auto 30px auto; display: none; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
        <h2 style="margin-top: 0;">Tambah Koleksi Baru</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <label style="display: block; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px;">
                Judul
                <input id="inputJudul" type="text" style="width:100%; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 6px;" />
            </label>
            <label style="display: block; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px;">
                Penulis
                <input id="inputPenulis" type="text" style="width:100%; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 6px;" />
            </label>
            <label style="display: block; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px;">
                Tahun
                <input id="inputTahun" type="text" style="width:100%; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 6px;" />
            </label>
            <label style="display: block; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px;">
                Kategori
                <input id="inputKategori" type="text" style="width:100%; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 6px;" />
            </label>
            <label style="grid-column: 1 / -1; display: block; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px;">
                URL Cover (opsional)
                <input id="inputCover" type="text" placeholder="https://..." style="width:100%; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 6px;" />
            </label>
            <label style="grid-column: 1 / -1; display: block; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px;">
                Deskripsi (opsional)
                <textarea id="inputDeskripsi" rows="4" style="width:100%; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 6px;"></textarea>
            </label>
        </div>
        <div style="margin-top: 18px; display: flex; gap: 12px;">
            <button id="btnSimpan" class="tombol-utama" style="flex: 1;">Simpan</button>
            <button id="btnBatal" class="tombol-utama" style="flex: 1; background-color: #ccc; color: #333;">Batal</button>
        </div>
    </div>

    <script>
        // ==========================================
        // --- 1. SELEKSI ELEMEN DOM ---
        // ==========================================
        const inputPencarian = document.getElementById("inputPencarian");
        const tabel = document.getElementById("tabelKatalog");
        const btnTambah = document.getElementById("btnTambah");
        const formTambah = document.getElementById("formTambah");
        const btnSimpan = document.getElementById("btnSimpan");
        const btnBatal = document.getElementById("btnBatal");
        const inputJudul = document.getElementById("inputJudul");
        const inputPenulis = document.getElementById("inputPenulis");
        const inputTahun = document.getElementById("inputTahun");
        const inputKategori = document.getElementById("inputKategori");
        const inputCover = document.getElementById("inputCover");
        const inputDeskripsi = document.getElementById("inputDeskripsi");

        // ==========================================
        // --- 2. DATA DEFAULT ---
        // ==========================================
        const defaultBooks = [
            {
                id: "1",
                judul: "Guru Gembul Bicara Pendidikan",
                penulis: "Irma Susanti, Hermawan Aksan",
                tahun: "2023",
                kategori: "Pendidikan",
                cover: "assets/ggbp.jpg",
                deskripsi: "Buku inspiratif yang membahas gagasan pendidikan dengan gaya dialog yang ringan dan penuh semangat."
            },
            {
                id: "2",
                judul: "Andai Aku Menteri Pendidikan",
                penulis: "Alfian Bahri",
                tahun: "2024",
                kategori: "Ilmu Sosial",
                cover: "assets/ab.jpg",
                deskripsi: "Refleksi dan rencana aksi pada sistem pendidikan, ditawarkan dari perspektif tokoh fiksi sebagai menteri."
            },
            {
                id: "3",
                judul: "With No Edge Nor Doubt",
                penulis: "Ahmad Muhaimin",
                tahun: "2024",
                kategori: "Kumpulan Puisi",
                cover: "assets/min.jpeg",
                deskripsi: "Kumpulan puisi modern yang penuh emosi dan imaji, cocok untuk pembaca yang mencari kedalaman rasa."
            }
        ];

        // ==========================================
        // --- 3. FUNGSI PENYIMPANAN (LOCAL STORAGE) ---
        // ==========================================
        function loadFromStorage() {
            try {
                const raw = localStorage.getItem('katalogBuku');
                return raw ? JSON.parse(raw) : [];
            } catch {
                return [];
            }
        }

        function saveToStorage(data) {
            localStorage.setItem('katalogBuku', JSON.stringify(data));
        }

        function getDeletedIds() {
            try {
                const raw = localStorage.getItem('katalogHapus');
                return raw ? JSON.parse(raw) : [];
            } catch {
                return [];
            }
        }

        function setDeletedIds(ids) {
            localStorage.setItem('katalogHapus', JSON.stringify(ids));
        }

        // ==========================================
        // --- 4. FUNGSI PENGELOLAAN DATA BUKU ---
        // ==========================================
        function getAllBooks() {
            const stored = loadFromStorage();
            const deleted = new Set(getDeletedIds());
            const merged = [];

            // Masukkan default books (kecuali yang sudah dihapus)
            defaultBooks.forEach(b => {
                if (!deleted.has(b.id)) {
                    merged.push(b);
                }
            });

            // Masukkan buku yang disimpan (tambahan / update), kecuali yang dihapus
            stored.forEach(b => {
                if (!deleted.has(b.id)) {
                    // Hapus versi default jika ada, lalu tambahkan versi terbaru
                    const idx = merged.findIndex(m => m.id === b.id);
                    if (idx !== -1) merged.splice(idx, 1);
                    merged.push(b);
                }
            });

            return merged;
        }

        function markBookDeleted(id) {
            const deleted = new Set(getDeletedIds());
            deleted.add(id);
            setDeletedIds(Array.from(deleted));
        }

        function unmarkBookDeleted(id) {
            const deleted = new Set(getDeletedIds());
            deleted.delete(id);
            setDeletedIds(Array.from(deleted));
        }

        // ==========================================
        // --- 5. FUNGSI RENDER ANTARMUKA ---
        // ==========================================
        function renderTable(books) {
            const rows = [
                `<tr>
                    <th>No.</th>
                    <th>Judul Buku</th>
                    <th>Penulis</th>
                    <th>Tahun</th>
                    <th>Kategori</th>
                    <th>Aksi</th>
                </tr>`
            ];

            books.forEach((b, idx) => {
                rows.push(`
                    <tr>
                        <td>${idx + 1}</td>
                        <td><a class="link-buku" href="detail.html?id=${b.id}">${b.judul}</a></td>
                        <td>${b.penulis}</td>
                        <td>${b.tahun}</td>
                        <td>${b.kategori}</td>
                        <td style="white-space: nowrap;">
                            <span class="icon-edit" onclick="editBook('${b.id}')" title="Sunting">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </span>
                            <span class="icon-delete" onclick="deleteBook('${b.id}')" title="Hapus">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </span>
                        </td>
                    </tr>
                `);
            });

            tabel.innerHTML = rows.join('');
        }

        let editingId = null;

        // ==========================================
        // --- 6. FUNGSI INTERAKSI PENGGUNA ---
        // ==========================================
        function refreshTable() {
            renderTable(getAllBooks());
            filterTable();
        }

        function setEditMode(id) {
            editingId = id;
            btnSimpan.innerText = 'Perbarui';
            btnSimpan.classList.add('tombol-utama');
            btnSimpan.style.backgroundColor = '#F2AB3B';
        }

        function clearEditMode() {
            editingId = null;
            btnSimpan.innerText = 'Simpan';
            btnSimpan.style.backgroundColor = '';
        }

        function filterTable() {
            const kataKunci = inputPencarian.value.toLowerCase();
            const baris = tabel.getElementsByTagName('tr');

            for (let i = 1; i < baris.length; i++) {
                const selData = baris[i].getElementsByTagName('td');
                let adaKecocokan = false;

                for (let j = 0; j < selData.length; j++) {
                    if (selData[j] && selData[j].innerText.toLowerCase().includes(kataKunci)) {
                        adaKecocokan = true;
                        break;
                    }
                }

                baris[i].style.display = adaKecocokan ? '' : 'none';
            }
        }

        function showForm(show) {
            formTambah.style.display = show ? 'block' : 'none';
            if (!show) {
                inputJudul.value = '';
                inputPenulis.value = '';
                inputTahun.value = '';
                inputKategori.value = '';
                inputCover.value = '';
            }
        }

        function generateNewId() {
            const allBooks = getAllBooks();
            const maxId = allBooks.reduce((max, b) => {
                const n = parseInt(b.id, 10);
                return Number.isNaN(n) ? max : Math.max(max, n);
            }, 0);
            return String(maxId + 1);
        }

        function addBook(book) {
            const stored = loadFromStorage();
            const idx = stored.findIndex(b => b.id === book.id);
            if (idx > -1) {
                stored[idx] = book; // update
            } else {
                stored.push(book);
            }
            saveToStorage(stored);
            unmarkBookDeleted(book.id);
            refreshTable();
        }

        function deleteBook(id) {
            if (!confirm('Yakin ingin menghapus buku ini?')) {
                return;
            }
            const stored = loadFromStorage();
            const filtered = stored.filter(b => {
                return b.id !== id;
            });
            saveToStorage(filtered);
            markBookDeleted(id);
            refreshTable();
        }

        function editBook(id) {
            const all = getAllBooks();
            const buku = all.find(b => b.id === id);
            if (!buku) return;

            inputJudul.value = buku.judul;
            inputPenulis.value = buku.penulis;
            inputTahun.value = buku.tahun;
            inputKategori.value = buku.kategori;
            inputCover.value = buku.cover;
            inputDeskripsi.value = buku.deskripsi || '';

            setEditMode(id);
            showForm(true);
        }

        // ==========================================
        // --- 7. EVENT LISTENERS ---
        // ==========================================
        btnTambah.addEventListener('click', () => {
            clearEditMode();
            showForm(true);
        });
        btnBatal.addEventListener('click', () => {
            clearEditMode();
            showForm(false);
        });

        btnSimpan.addEventListener('click', () => {
            const judul = inputJudul.value.trim();
            const penulis = inputPenulis.value.trim();
            const tahun = inputTahun.value.trim();
            const kategori = inputKategori.value.trim();
            const cover = inputCover.value.trim() || `https://via.placeholder.com/200x300/48a39e/ffffff?text=${encodeURIComponent(judul)}`;
            const deskripsi = inputDeskripsi.value.trim() || 'Deskripsi belum tersedia.';

            if (!judul || !penulis || !tahun || !kategori) {
                alert('Silakan isi semua kolom (judul, penulis, tahun, kategori).');
                return;
            }

            const bookData = {
                id: editingId || generateNewId(),
                judul,
                penulis,
                tahun,
                kategori,
                cover,
                deskripsi
            };

            addBook(bookData);
            clearEditMode();
            showForm(false);
        });

        inputPencarian.addEventListener('keyup', filterTable);

        // ==========================================
        // --- 8. INISIALISASI HALAMAN ---
        // ==========================================
        
        // Cek jika URL memiliki parameter edit, langsung buka form dan isi data
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('edit');
        if (editId) {
            editBook(editId);
        }

        // Muat tabel saat halaman pertama kali dibuka
        refreshTable();
    </script>
    <footer style="text-align:center; margin-top:40px; font-size:14px; color:#555; background-color:rgba(255,255,255,0.85); padding:10px; border-radius:8px; max-width:300px; margin-left:auto; margin-right:auto;">
    Made with 🧠 by 
    <a href="https://github.com/mymn-fy" target="_blank"
        style="color:inherit; text-decoration:none;"
        onmousedown="this.style.color='#F2AB3B'; this.style.textDecoration='underline';"
        onmouseup="this.style.color='inherit'; this.style.textDecoration='none';"
        onmouseleave="this.style.color='inherit'; this.style.textDecoration='none';">
        Min
    </a>
</footer>
</body>
</html>
